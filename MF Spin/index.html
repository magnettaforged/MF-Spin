<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Spin</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #111;
    }

    .game {
      width: 550px;
      background: rgba(27,27,27,0.94);
      border: 2px solid #7a5a22;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      backdrop-filter: blur(3px);
    }

    .logo {
      max-width: 260px;
      max-height: 95px;
      object-fit: contain;
      margin: 0 auto 10px;
      display: block;
    }

    .slotFrame {
      position: relative;
      margin: 10px auto 14px;
      width: fit-content;
      height: 436px;
      overflow: hidden;
      padding: 8px;
      border-radius: 18px;
      background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.65)),
        url("images/slot-background.png");
      background-size: cover;
      background-position: center;
      border: 1px solid #333;
      box-shadow: inset 0 0 18px #000;
    }

    .activeWindow {
      position: absolute;
      left: 3px;
      right: 3px;
      top: 74px;
      height: 292px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      pointer-events: none;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.05);
      z-index: 3;
    }

    .slotGrid {
      display: grid;
      grid-template-columns: repeat(5, 88px);
      grid-template-rows: repeat(5, 88px);
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 2;
      transform: translateY(-22px);
    }

    .cell {
      width: 88px;
      height: 88px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .blankCell {
      background: rgba(0,0,0,0.28);
      border-color: rgba(255,255,255,0.025);
      box-shadow: inset 0 0 14px rgba(0,0,0,0.95);
    }

    .teaserCell {
      opacity: 0.18;
      filter: grayscale(1) brightness(0.6);
      transform: scale(0.9);
    }

    .activeCell {
      opacity: 1;
      filter: none;
    }

    .spinning {
      animation: shake 0.08s linear infinite;
      filter: none;
    }

    .teaserCell.spinning {
      opacity: 0.18;
      filter: grayscale(1) brightness(0.6);
    }

    .winningCell {
      border: 2px solid #f0c35a;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.8),
        0 0 16px rgba(240,195,90,0.95),
        0 0 28px rgba(240,195,90,0.55);
    }

    @keyframes shake {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(6px); }
    }

    .tokenBar {
      margin: 8px auto 8px;
      padding: 8px 12px;
      width: fit-content;
      min-width: 220px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d6a84f;
      font-size: 18px;
      font-weight: bold;
    }

    .controlBar {
      display: grid;
      grid-template-columns: 1fr 1fr 1.1fr;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 8px;
    }

    .stepControl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 5px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 7px;
      min-height: 42px;
    }

    .controlLabel {
      color: #aaa;
      font-size: 12px;
      text-align: left;
      line-height: 1.15;
    }

    .controlValue {
      color: #d6a84f;
      font-weight: bold;
      font-size: 16px;
      min-width: 48px;
      text-align: center;
    }

    .arrowButton {
      width: 26px;
      height: 28px;
      padding: 0;
      margin: 0;
      border-radius: 8px;
      border: 1px solid #7a5a22;
      background: #252525;
      color: #d6a84f;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .spinButton {
      width: 100%;
      height: 56px;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 12px;
      background: #d6a84f;
      color: #111;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .totalBetLine {
      margin-top: 8px;
      font-size: 14px;
      color: #ccc;
    }

    .result {
      margin-top: 14px;
      min-height: 70px;
      font-size: 15px;
      line-height: 1.45;
    }

    .winInfo {
      margin-top: 14px;
      border-top: 1px solid #333;
      padding-top: 12px;
      text-align: left;
      font-size: 13px;
      color: #ddd;
    }

    .winCard {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      line-height: 1.5;
    }

    .winCard strong {
      display: block;
      color: #d6a84f;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .winRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 3px 0;
    }

    .winRow:last-child {
      border-bottom: none;
    }

    .winGap {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(214,168,79,0.25);
    }

    .bottomStats {
      margin-top: 12px;
      color: #777;
      font-size: 13px;
    }

    .resetButton {
      margin-top: 12px;
      width: 100%;
      background: #222;
      color: #777;
      border: 1px solid #333;
      font-size: 12px;
      padding: 8px;
      border-radius: 10px;
      cursor: pointer;
    }

    .resetButton:hover {
      color: #d6a84f;
      border-color: #7a5a22;
    }

    @media (max-width: 600px) {
      .game {
        width: 94vw;
        padding: 10px;
      }

      .logo {
        max-width: 220px;
      }

      .slotGrid {
        grid-template-columns: repeat(5, 64px);
        grid-template-rows: repeat(5, 64px);
        gap: 8px;
        transform: translateY(-16px);
      }

      .cell {
        width: 64px;
        height: 64px;
        font-size: 30px;
      }

      .slotFrame {
        height: 320px;
      }

      .activeWindow {
        top: 64px;
        height: 208px;
      }

      .controlBar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="game">
    <img src="images/logo.png" class="logo" alt="MagnettaForged Logo">

    <div class="slotFrame">
      <div class="activeWindow"></div>
      <div class="slotGrid" id="slotGrid"></div>
    </div>

    <div class="tokenBar">
      Forge Tokens: <span id="tokenBalance">0</span>
    </div>

    <div class="controlBar">
      <div class="stepControl">
        <span class="controlLabel">Base<br>Bet</span>
        <button class="arrowButton" onclick="changeBaseBet(-1)">‹</button>
        <span class="controlValue" id="baseBetDisplay">Free</span>
        <button class="arrowButton" onclick="changeBaseBet(1)">›</button>
      </div>

      <div class="stepControl">
        <span class="controlLabel">Spin<br>Multiplier</span>
        <button class="arrowButton" onclick="changeMultiplier(-1)">‹</button>
        <span class="controlValue" id="multiplierDisplay">1x</span>
        <button class="arrowButton" onclick="changeMultiplier(1)">›</button>
      </div>

      <button class="spinButton" id="spinButton" onclick="spin()">SPIN</button>
    </div>

    <div class="totalBetLine">
      Total Bet: <span id="finalBetDisplay">0</span> Tokens
    </div>

    <div class="result" id="result">Choose a bet and press spin.</div>

    <div class="winInfo" id="winInfo"></div>

    <div class="bottomStats">
      Total Spins: <span id="spinCount">0</span>
    </div>

    <button class="resetButton" onclick="resetGame()">Reset Game</button>
  </div>

  <script>
    const VISIBLE_ROWS = 5;
    const COLS = 5;

    const baseBetOptions = [0, 10, 25, 50, 75, 100];
    const multiplierOptions = [1, 10, 50, 100, 1000, 5000];

    let baseBetIndex = 0;
    let multiplierIndex = 0;

    const symbolPool = [
      { name: "Axe", type: "emoji", value: "⚒️" },
      { name: "Axe", type: "emoji", value: "⚒️" },
      { name: "Axe", type: "emoji", value: "⚒️" },
      { name: "Axe", type: "emoji", value: "⚒️" },

      { name: "Maya", type: "image", value: "images/Maya 001.png" },
      { name: "Maya", type: "image", value: "images/Maya 001.png" },
      { name: "Maya", type: "image", value: "images/Maya 001.png" },

      { name: "Reign", type: "image", value: "images/reign 001.png" },
      { name: "Reign", type: "image", value: "images/reign 001.png" },
      { name: "Reign", type: "image", value: "images/reign 001.png" },

      { name: "Kyra", type: "image", value: "images/Kyra 001.png" },
      { name: "Kyra", type: "image", value: "images/Kyra 001.png" },
      { name: "Kyra", type: "image", value: "images/Kyra 001.png" },

      { name: "Nadia", type: "image", value: "images/Nadia 001.png" },
      { name: "Nadia", type: "image", value: "images/Nadia 001.png" },
      { name: "Nadia", type: "image", value: "images/Nadia 001.png" },

      { name: "Gem", type: "emoji", value: "💎" },
      { name: "Gem", type: "emoji", value: "💎" },

      { name: "Blank", type: "blank", value: "" },
      { name: "Blank", type: "blank", value: "" }
    ];

    const paylines = [
      { name: "Top Active Row", rows: [1, 1, 1, 1, 1] },
      { name: "Middle Active Row", rows: [2, 2, 2, 2, 2] },
      { name: "Bottom Active Row", rows: [3, 3, 3, 3, 3] },
      { name: "V Line", rows: [1, 2, 3, 2, 1] },
      { name: "Inverted V Line", rows: [3, 2, 1, 2, 3] }
    ];

    let tokens = Number(localStorage.getItem("forgeTokens"));
    if (isNaN(tokens)) {
      tokens = 0;
      localStorage.setItem("forgeTokens", tokens);
    }

    let totalSpins = Number(localStorage.getItem("forgeTotalSpins")) || 0;

    const tokenBalance = document.getElementById("tokenBalance");
    const spinCount = document.getElementById("spinCount");
    const finalBetDisplay = document.getElementById("finalBetDisplay");
    const baseBetDisplay = document.getElementById("baseBetDisplay");
    const multiplierDisplay = document.getElementById("multiplierDisplay");
    const slotGrid = document.getElementById("slotGrid");
    const result = document.getElementById("result");
    const spinButton = document.getElementById("spinButton");

    createGrid();
    updateDisplay();

    function randomSymbol() {
      return symbolPool[Math.floor(Math.random() * symbolPool.length)];
    }

    function showSymbol(cell, symbol) {
      cell.innerHTML = "";
      cell.classList.remove("blankCell");

      if (symbol.type === "image") {
        const img = document.createElement("img");
        img.src = symbol.value;
        img.alt = symbol.name;
        cell.appendChild(img);
      } else if (symbol.type === "blank") {
        cell.classList.add("blankCell");
        cell.textContent = "";
      } else {
        cell.textContent = symbol.value;
      }
    }

    function createGrid() {
      slotGrid.innerHTML = "";

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const cell = document.createElement("div");
          const isTeaserRow = row === 0 || row === 4;

          cell.className = isTeaserRow ? "cell teaserCell" : "cell activeCell";
          cell.id = `cell-${row}-${col}`;

          showSymbol(cell, randomSymbol());
          slotGrid.appendChild(cell);
        }
      }
    }

    function getCell(row, col) {
      return document.getElementById(`cell-${row}-${col}`);
    }

    function changeBaseBet(direction) {
      baseBetIndex += direction;
      if (baseBetIndex < 0) baseBetIndex = baseBetOptions.length - 1;
      if (baseBetIndex >= baseBetOptions.length) baseBetIndex = 0;
      updateDisplay();
    }

    function changeMultiplier(direction) {
      multiplierIndex += direction;
      if (multiplierIndex < 0) multiplierIndex = multiplierOptions.length - 1;
      if (multiplierIndex >= multiplierOptions.length) multiplierIndex = 0;
      updateDisplay();
    }

    function getBaseBet() {
      return baseBetOptions[baseBetIndex];
    }

    function getMultiplier() {
      return multiplierOptions[multiplierIndex];
    }

    function getFinalBet() {
      const baseBet = getBaseBet();
      const multiplier = getMultiplier();
      if (baseBet === 0) return 0;
      return baseBet * multiplier;
    }

    function getLineBet() {
      const finalBet = getFinalBet();
      if (finalBet === 0) return 0;
      return Math.floor(finalBet / paylines.length);
    }

    function updateDisplay() {
      const baseBet = getBaseBet();
      const multiplier = getMultiplier();

      tokenBalance.textContent = tokens.toLocaleString();
      spinCount.textContent = totalSpins.toLocaleString();
      finalBetDisplay.textContent = getFinalBet().toLocaleString();

      baseBetDisplay.textContent = baseBet === 0 ? "Free" : baseBet.toLocaleString();
      multiplierDisplay.textContent = multiplier + "x";

      updateWinInfo();
    }

    function getSymbolProbabilities() {
      const counts = {};
      const total = symbolPool.length;

      symbolPool.forEach(symbol => {
        if (symbol.name !== "Blank") {
          counts[symbol.name] = (counts[symbol.name] || 0) + 1;
        }
      });

      return Object.values(counts).map(count => count / total);
    }

    function calculateOdds() {
      const probabilities = getSymbolProbabilities();

      let twoInRow = 0;
      let threeInRow = 0;
      let fourInRow = 0;
      let fiveInRow = 0;

      probabilities.forEach(p => {
        twoInRow += Math.pow(p, 2) * (1 - p);
        threeInRow += Math.pow(p, 3) * (1 - p);
        fourInRow += Math.pow(p, 4) * (1 - p);
        fiveInRow += Math.pow(p, 5);
      });

      const anyLineWin = twoInRow + threeInRow + fourInRow + fiveInRow;
      const approxAnySpinWin = 1 - Math.pow(1 - anyLineWin, paylines.length);
      const approxMaxTotalWin = Math.pow(fiveInRow, paylines.length);

      return {
        twoInRow,
        threeInRow,
        fourInRow,
        fiveInRow,
        approxAnySpinWin,
        approxMaxTotalWin
      };
    }

    function formatOdds(probability) {
      if (probability <= 0) return "Never";

      const oneIn = Math.round(1 / probability).toLocaleString();
      const percent = (probability * 100).toFixed(probability < 0.001 ? 4 : 2);

      return `${percent}% / 1 in ${oneIn}`;
    }

    function updateWinInfo() {
      const winInfo = document.getElementById("winInfo");
      const finalBet = getFinalBet();
      const lineBet = getLineBet();
      const odds = calculateOdds();

      const values = finalBet === 0
        ? {
            two: 25,
            three: 100,
            four: 250,
            five: 1000,
            maxTotal: 5000
          }
        : {
            two: lineBet * 1,
            three: lineBet * 5,
            four: lineBet * 25,
            five: lineBet * 100,
            maxTotal: lineBet * 100 * paylines.length
          };

      winInfo.innerHTML = `
        <div class="winCard">
          <strong>Possible Wins & Odds</strong>

          <div class="winRow">
            <span>2 in row: ${values.two.toLocaleString()}</span>
            <span>${formatOdds(odds.twoInRow)}</span>
          </div>

          <div class="winRow">
            <span>3 in row: ${values.three.toLocaleString()}</span>
            <span>${formatOdds(odds.threeInRow)}</span>
          </div>

          <div class="winRow">
            <span>4 in row: ${values.four.toLocaleString()}</span>
            <span>${formatOdds(odds.fourInRow)}</span>
          </div>

          <div class="winRow">
            <span>5 in row: ${values.five.toLocaleString()}</span>
            <span>${formatOdds(odds.fiveInRow)}</span>
          </div>

          <div class="winRow winGap">
            <span>Hit Chance</span>
            <span>${formatOdds(odds.approxAnySpinWin)}</span>
          </div>

          <div class="winRow">
            <span>Max possible win: ${values.maxTotal.toLocaleString()}</span>
            <span>${formatOdds(odds.approxMaxTotalWin)}</span>
          </div>
        </div>
      `;
    }

    function paidMultiplierForMatch(matchCount) {
      if (matchCount >= 5) return 100;
      if (matchCount === 4) return 25;
      if (matchCount === 3) return 5;
      if (matchCount === 2) return 1;
      return 0;
    }

    function freePayoutForMatch(matchCount) {
      if (matchCount >= 5) return 1000;
      if (matchCount === 4) return 250;
      if (matchCount === 3) return 100;
      if (matchCount === 2) return 25;
      return 0;
    }

    function buildFinalGrid() {
      const grid = [];

      for (let row = 0; row < VISIBLE_ROWS; row++) {
        grid[row] = [];

        for (let col = 0; col < COLS; col++) {
          grid[row][col] = randomSymbol();
        }
      }

      return grid;
    }

    function clearWinningHighlights() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("winningCell");
      });
    }

    function evaluatePaylines(grid) {
      const wins = [];

      paylines.forEach((line) => {
        const firstSymbol = grid[line.rows[0]][0];

        if (firstSymbol.name === "Blank") return;

        let matchCount = 1;

        for (let col = 1; col < COLS; col++) {
          const row = line.rows[col];
          const symbol = grid[row][col];

          if (symbol.name === firstSymbol.name && symbol.name !== "Blank") {
            matchCount++;
          } else {
            break;
          }
        }

        if (matchCount >= 2) {
          wins.push({
            lineName: line.name,
            symbol: firstSymbol.name,
            matchCount,
            cells: line.rows.slice(0, matchCount).map((row, col) => ({ row, col }))
          });
        }
      });

      return wins;
    }

    function highlightWins(wins) {
      wins.forEach(win => {
        win.cells.forEach(cellPosition => {
          getCell(cellPosition.row, cellPosition.col).classList.add("winningCell");
        });
      });
    }

    function setControlsDisabled(disabled) {
      spinButton.disabled = disabled;

      document.querySelectorAll(".arrowButton").forEach(button => {
        button.disabled = disabled;
      });
    }

    function spin() {
      const finalBet = getFinalBet();
      const lineBet = getLineBet();

      if (finalBet > tokens) {
        result.textContent = "Not enough Forge Tokens for that spin.";
        return;
      }

      setControlsDisabled(true);
      clearWinningHighlights();
      result.textContent = "Spinning...";

      if (finalBet > 0) {
        tokens -= finalBet;
        localStorage.setItem("forgeTokens", tokens);
        updateDisplay();
      }

      const finalGrid = buildFinalGrid();
      const intervals = [];

      for (let col = 0; col < COLS; col++) {
        intervals[col] = setInterval(() => {
          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            showSymbol(cell, randomSymbol());
            cell.classList.add("spinning");
          }
        }, 70);

        setTimeout(() => {
          clearInterval(intervals[col]);

          for (let row = 0; row < VISIBLE_ROWS; row++) {
            const cell = getCell(row, col);
            cell.classList.remove("spinning");
            showSymbol(cell, finalGrid[row][col]);
          }

          if (col === COLS - 1) {
            finishSpin(finalGrid, finalBet, lineBet);
          }
        }, 900 + col * 350);
      }
    }

    function finishSpin(finalGrid, finalBet, lineBet) {
      const wins = evaluatePaylines(finalGrid);
      let payout = 0;
      let message = "";

      highlightWins(wins);

      if (finalBet === 0) {
        if (wins.length === 0) {
          payout = 0;
          message = "Payout: 0 Forge Tokens<br>No line win.";
        } else {
          const details = [];

          wins.forEach(win => {
            const linePayout = freePayoutForMatch(win.matchCount);
            payout += linePayout;
            details.push(`${win.lineName}: ${win.matchCount}x ${win.symbol}`);
          });

          message = `
            Payout: ${payout.toLocaleString()} Forge Tokens<br>
            ${details.join("<br>")}
          `;
        }
      } else {
        const details = [];

        wins.forEach(win => {
          const multiplier = paidMultiplierForMatch(win.matchCount);
          const linePayout = lineBet * multiplier;
          payout += linePayout;

          details.push(`${win.lineName}: ${win.matchCount}x ${win.symbol}`);
        });

        message = `
          Payout: ${payout.toLocaleString()} Forge Tokens<br>
          ${details.length > 0 ? details.join("<br>") : "No line win"}
        `;
      }

      tokens += payout;
      totalSpins += 1;

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);

      updateDisplay();
      result.innerHTML = message;
      setControlsDisabled(false);
    }

    function resetGame() {
      tokens = 0;
      totalSpins = 0;

      localStorage.setItem("forgeTokens", tokens);
      localStorage.setItem("forgeTotalSpins", totalSpins);

      clearWinningHighlights();
      updateDisplay();

      result.textContent = "Game reset. Tokens and spins set to 0.";
    }
  </script>
</body>
</html>
